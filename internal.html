<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CSS Internal</title>

    <style>

        body{
            background-color:#f0f0f0;
        }

        h2{
            color:green;
        }

        .kotak{
            background-color:orange;
            padding:10px;
        }

        #judul{
            color:blue;
        }

        div p{
            color:red;
        }

        ul li{
            color:brown;
        }

        input[type=text]{
            border:2px solid black;
        }

        a:hover{
            color:purple;
        }

        section{
            background-color:lightblue;
        }

        *{
            margin-top:5px;
        }

    </style>

</head>
<body>

<h1>CSS INTERNAL</h1>

<p>
CSS Internal adalah CSS yang ditulis di dalam tag style pada bagian head HTML.
</p>

<hr>

<div class="kotak">
    2. Selektor Class
</div>

<h3 id="judul">
    3. Selektor ID
</h3>

<div>
<p>
    4. Descendant Selector
</p>
</div>

<ul>
<li>
    5. UL LI Selector
</li>
</ul>

<input type="text"
placeholder="6. Input Type">

</html>
