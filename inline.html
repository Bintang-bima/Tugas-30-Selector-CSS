<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CSS Inline</title>
</head>
<body>

<h1>CSS INLINE</h1>

<p>
CSS Inline adalah CSS yang ditulis langsung pada tag HTML menggunakan atribut style.
</p>

<hr>

<h1 style="color:red;">
    1. Selektor H1
</h1>

<p style="color:blue;">
    2. Selektor Paragraph
</p>

<div style="background-color:yellow;">
    3. Selektor DIV
</div>

<br>

<span style="font-size:20px;">
    4. Selektor Span
</span>

<br><br>

<button style="background-color:black; color:white;">
    5. Selektor Button
</button>

<br><br>

<input type="text"
placeholder="6. Selektor Input"
style="border:2px solid red;">

<br><br>

<img src="https://via.placeholder.com/100"
style="border-radius:20px;">

<br><br>

<a href="#"
style="text-decoration:none;">
    8. Selektor Link
</a>

<br><br>

<table border="1"
style="width:200px;">
<tr>
<td>9. Selektor Table</td>
</tr>
</table>

<ul>
<li style="color:purple;">
    10. Selektor List
</li>
</ul>

<br>

<a href="index.html">
    Kembali
</a>

</body>
</html>
